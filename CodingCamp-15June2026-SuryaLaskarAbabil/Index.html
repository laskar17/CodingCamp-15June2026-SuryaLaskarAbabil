<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-violet-500 to-purple-600 p-8">

    <div class="max-w-6xl mx-auto">

        <!-- HEADER -->
        <div class="card text-center relative">

            <!-- Dark Mode Toggle -->
            <button id="themeBtn" class="btn-light absolute top-4 right-4 text-xl" title="Toggle Dark Mode">
                🌙
            </button>

            <h1 id="clock" class="clock">
                00:00:00
            </h1>

            <p id="date" class="text-gray-500 mt-2"></p>

            <h2 id="greeting" class="text-3xl font-bold mt-4">
                Good Morning
            </h2>

        </div>

        <!-- GRID -->
        <div class="grid md:grid-cols-2 gap-6 mt-6">

            <!-- TIMER -->
            <div class="card">

                <h2 class="title">Focus Timer</h2>

                <h1 id="timer" class="timer">
                    25:00
                </h1>

                <div class="flex justify-center gap-3">

                    <button id="startBtn" class="btn-primary">
                        Start
                    </button>

                    <button id="stopBtn" class="btn-secondary">
                        Stop
                    </button>

                    <button id="resetBtn" class="btn-light">
                        Reset
                    </button>

                </div>

                <!-- Custom Pomodoro Time -->
                <div class="flex items-center justify-center gap-2 mt-4">
                    <label class="text-sm text-gray-500">Set minutes:</label>
                    <input id="customTime"
                        class="input text-center"
                        style="width:80px"
                        type="number"
                        min="1"
                        max="120"
                        placeholder="25">
                    <button id="setTimeBtn" class="btn-light text-sm">
                        Set
                    </button>
                </div>

            </div>

            <!-- TASK -->
            <div class="card">

                <h2 class="title mb-4">
                    Tasks
                </h2>

                <div class="flex gap-2">

                    <input id="taskInput"
                        class="input"
                        type="text"
                        placeholder="Add new task">

                    <button id="addTask" class="btn-primary">
                        Add
                    </button>

                </div>

                <!-- Duplicate warning -->
                <p id="duplicateWarning" class="text-red-500 text-sm mt-2" style="display:none">
                    ⚠️ Task already exists!
                </p>

                <div id="taskList" class="mt-6 space-y-3">

                </div>

            </div>

            <!-- QUICK LINK -->
            <div class="card">

                <h2 class="title mb-4">
                    Quick Links
                </h2>

                <div class="flex gap-2">

                    <input id="linkName"
                        class="input"
                        placeholder="Name">

                    <input id="linkUrl"
                        class="input"
                        placeholder="URL">

                    <button id="addLink" class="btn-primary">
                        Add
                    </button>

                </div>

                <div id="links"
                    class="flex flex-wrap gap-3 mt-6">

                </div>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
